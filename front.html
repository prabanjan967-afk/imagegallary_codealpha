<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRAME — Visual Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>


  <header class="header">
    <span class="logo">FR<span class="logo-accent">A</span>ME</span>
    <span class="header-meta">Visual Archive — 2024</span>
  </header>

  
  <div class="hero">
    <h1 class="hero-title">Curated<br><em>Frames</em></h1>
    <p class="hero-sub">A collection spanning architecture, nature, urban landscapes, and abstract forms.</p>
  </div>

  
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All <span class="filter-count" id="countAll"></span></button>
    <button class="filter-btn" data-filter="architecture">Architecture <span class="filter-count" id="countArchitecture"></span></button>
    <button class="filter-btn" data-filter="nature">Nature <span class="filter-count" id="countNature"></span></button>
    <button class="filter-btn" data-filter="urban">Urban <span class="filter-count" id="countUrban"></span></button>
    <button class="filter-btn" data-filter="abstract">Abstract <span class="filter-count" id="countAbstract"></span></button>
    <button class="filter-btn" data-filter="portrait">Portrait <span class="filter-count" id="countPortrait"></span></button>
  </div>


  <div class="gallery-wrapper">
    <div class="grid" id="galleryGrid"></div>
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p class="empty-title">No images found</p>
      <p class="empty-sub">Try a different category</p>
    </div>
  </div>

  
  <div id="lightbox" class="lightbox">
    <div class="lb-inner" id="lbInner">
      <button class="lb-close" id="lbClose" title="Close (ESC)">&#x2715;</button>
      <div class="lb-img-wrap">
        <img class="lb-img" id="lbImg" src="" alt="" />
        <span class="lb-counter" id="lbCounter"></span>
      </div>
      <div class="lb-info">
        <div>
          <p class="lb-category" id="lbCategory"></p>
          <h2 class="lb-title" id="lbTitle"></h2>
          <p class="lb-desc" id="lbDesc"></p>
          <div class="lb-meta-grid">
            <div class="lb-meta-item">
              <p class="lb-meta-label">Category</p>
              <p class="lb-meta-value" id="lbCat"></p>
            </div>
            <div class="lb-meta-item">
              <p class="lb-meta-label">Index</p>
              <p class="lb-meta-value" id="lbIndex"></p>
            </div>
          </div>
        </div>
        <div class="lb-nav">
          <button class="lb-nav-btn" id="lbPrev">&#8592; Prev</button>
          <button class="lb-nav-btn" id="lbNext">Next &#8594;</button>
        </div>
      </div>
    </div>
  </div>

  
  <div class="kb-hint" id="kbHint">
    <span class="kb-key">&#8592; &#8594; &nbsp;Navigate</span>
    <span class="kb-key">ESC &nbsp;Close</span>
  </div>

  
  <button class="scroll-top" id="scrollTop" title="Back to top">&#8593;</button>

  <script>
    
    const images = [
      { id:1,  title:"Geometric Corridors",  category:"architecture", image:"https://picsum.photos/id/1011/800/600", desc:"Light fractures through repeating concrete arches, creating an infinite rhythm of form and shadow." },
      { id:2,  title:"Forest Breath",         category:"nature",       image:"https://picsum.photos/id/1015/800/600", desc:"Morning mist settles between ancient pine trunks, the forest suspended in quiet contemplation." },
      { id:3,  title:"Neon Meridian",         category:"urban",        image:"https://picsum.photos/id/1019/800/600", desc:"A rain-slicked street reflects the competing grids of advertisement and commerce." },
      { id:4,  title:"Chromatic Dissolution", category:"abstract",     image:"https://picsum.photos/id/1025/800/600", desc:"Pigments meet water and surrender all control, producing forms no hand could deliberately craft." },
      { id:5,  title:"Glass Facade",          category:"architecture", image:"https://picsum.photos/id/1029/800/600", desc:"A curtain wall captures the sky's moods, becoming a mirror of shifting meteorological theater." },
      { id:6,  title:"Silent Portrait",       category:"portrait",     image:"https://picsum.photos/id/1027/800/600", desc:"A figure navigates the empty corridors of early morning, belonging fully to the moment." },
      { id:7,  title:"Cliff Edge",            category:"nature",       image:"https://picsum.photos/id/1018/800/600", desc:"Sea cliffs carved over millennia stand as geological autobiography, patient beyond human reckoning." },
      { id:8,  title:"Layer Study",           category:"abstract",     image:"https://picsum.photos/id/1050/800/600", desc:"Strata of accumulated mark-making yield unexpected harmonics between intention and accident." },
      { id:9,  title:"Transit Hub",           category:"urban",        image:"https://picsum.photos/id/1040/800/600", desc:"The cathedral logic of the station — vaulted, purposeful, containing thousands of private journeys." },
      { id:10, title:"Brutalist Tower",       category:"architecture", image:"https://picsum.photos/id/1060/800/600", desc:"Raw concrete speaks the language of conviction — undecorated, structural, unapologetically honest." },
      { id:11, title:"Golden Hour",           category:"nature",       image:"https://picsum.photos/id/1080/800/600", desc:"The final minutes of light transfigure an ordinary meadow into something briefly sacred." },
      { id:12, title:"Face Study",            category:"portrait",     image:"https://picsum.photos/id/1074/800/600", desc:"Every line of a face tells a story that words alone could never fully capture." },
    ];

    
    let activeFilter = "all";
    let currentIndex = 0;
    let visibleItems = [];

    
    function updateCounts() {
      document.getElementById("countAll").textContent = images.length;
      ["architecture","nature","urban","abstract","portrait"].forEach(function(cat) {
        var el = document.getElementById("count" + cat.charAt(0).toUpperCase() + cat.slice(1));
        if (el) el.textContent = images.filter(function(i){ return i.category === cat; }).length;
      });
    }

    
    function renderGallery() {
      var grid = document.getElementById("galleryGrid");
      var empty = document.getElementById("emptyState");
      grid.innerHTML = "";

      visibleItems = activeFilter === "all"
        ? images.slice()
        : images.filter(function(i){ return i.category === activeFilter; });

      if (visibleItems.length === 0) {
        empty.classList.add("visible");
        return;
      }
      empty.classList.remove("visible");

      visibleItems.forEach(function(img, idx) {
        var card = document.createElement("div");
        card.className = "card";
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", "Open " + img.title);
        card.style.animationDelay = (idx * 0.05) + "s";

        card.innerHTML =
          '<div class="skeleton"></div>' +
          '<img src="' + img.image + '" alt="' + img.title + '" loading="lazy" />' +
          '<div class="overlay">' +
            '<span class="overlay-badge">' + img.category + '</span>' +
            '<div class="overlay-bottom">' +
              '<h3 class="overlay-title">' + img.title + '</h3>' +
              '<p class="overlay-cat">' + img.category + '</p>' +
            '</div>' +
          '</div>' +
          '<span class="card-num">' + String(idx + 1).padStart(2, "0") + '</span>';

        var imgEl = card.querySelector("img");
        imgEl.addEventListener("load", function(){ card.classList.add("loaded"); });
        if (imgEl.complete) card.classList.add("loaded");

        (function(i) {
          card.addEventListener("click", function(){ openLightbox(i); });
          card.addEventListener("keydown", function(e){
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openLightbox(i); }
          });
        })(idx);

        grid.appendChild(card);
      });
    }

    
    document.getElementById("filterBar").addEventListener("click", function(e) {
      var btn = e.target.closest(".filter-btn");
      if (!btn) return;
      document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      activeFilter = btn.dataset.filter;
      renderGallery();
    });

    
    function openLightbox(idx) {
      currentIndex = idx;
      fillLightbox();
      document.getElementById("lightbox").classList.add("open");
      document.getElementById("kbHint").classList.add("visible");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
      document.getElementById("kbHint").classList.remove("visible");
      document.body.style.overflow = "";
    }

    function navigate(dir) {
      var lbImg = document.getElementById("lbImg");
      lbImg.classList.add("fade");
      setTimeout(function() {
        currentIndex = (currentIndex + dir + visibleItems.length) % visibleItems.length;
        fillLightbox();
        lbImg.classList.remove("fade");
      }, 200);
    }

    function fillLightbox() {
      var img = visibleItems[currentIndex];
      document.getElementById("lbImg").src    = img.image;
      document.getElementById("lbImg").alt    = img.title;
      document.getElementById("lbCategory").textContent = "— " + img.category.toUpperCase();
      document.getElementById("lbTitle").textContent    = img.title;
      document.getElementById("lbDesc").textContent     = img.desc;
      document.getElementById("lbCat").textContent      = img.category.charAt(0).toUpperCase() + img.category.slice(1);
      document.getElementById("lbIndex").textContent    = (currentIndex + 1) + " of " + visibleItems.length;
      document.getElementById("lbCounter").textContent  = (currentIndex + 1) + " / " + visibleItems.length;
    }

    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    document.getElementById("lbPrev").addEventListener("click", function(){ navigate(-1); });
    document.getElementById("lbNext").addEventListener("click", function(){ navigate(1); });

    document.getElementById("lightbox").addEventListener("click", function(e) {
      if (e.target === document.getElementById("lightbox")) closeLightbox();
    });

    document.addEventListener("keydown", function(e) {
      if (!document.getElementById("lightbox").classList.contains("open")) return;
      if (e.key === "Escape")     closeLightbox();
      if (e.key === "ArrowLeft")  navigate(-1);
      if (e.key === "ArrowRight") navigate(1);
    });

    
    var touchX = 0;
    document.getElementById("lightbox").addEventListener("touchstart", function(e){
      touchX = e.touches[0].clientX;
    }, { passive: true });
    document.getElementById("lightbox").addEventListener("touchend", function(e){
      var dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
    }, { passive: true });

    
    var scrollBtn = document.getElementById("scrollTop");
    window.addEventListener("scroll", function(){
      scrollBtn.classList.toggle("visible", window.scrollY > 400);
    });
    scrollBtn.addEventListener("click", function(){
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    
    updateCounts();
    renderGallery();
  </script>
</body>
</html>
